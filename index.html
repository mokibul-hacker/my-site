<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mokibul Khan Server</title>
    <style>
        body {
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        .server-box {
            border: 3px solid #00ff00;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 25px #00ff00;
            background: rgba(0, 0, 0, 0.9);
            width: 320px;
            transition: 0.5s;
        }

        h1 {
            color: #00ff00;
            font-size: 22px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ff00;
        }

        #status-text {
            color: #00ff00;
            font-size: 14px;
            margin-bottom: 25px;
        }

        input {
            width: 90%;
            padding: 12px;
            background: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #00ff00;
            border: none;
            color: black;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
        }

        button:hover {
            box-shadow: 0 0 20px #00ff00;
            background-color: #00cc00;
        }

        /* Welcome Message Style */
        .welcome-msg {
            display: none;
            color: #00ff00;
            font-size: 24px;
            text-shadow: 0 0 15px #00ff00;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="server-box" id="loginBox">
        <h1>MOKIBUL KHAN SERVER</h1>
        <p id="status-text">System Locked: Enter Key</p>
        
        <div id="inputArea">
            <input type="password" id="keyInput" placeholder="Secret Key...">
            <button onclick="checkKey()">ACCESS GRANTED</button>
        </div>

        <div id="welcomeArea" class="welcome-msg">
            WELCOME TO MINI SERVER MOKIBUL
        </div>
    </div>

    <script>
        function checkKey() {
            const key = document.getElementById("keyInput").value;
            
            // आपका पासवर्ड यहाँ है: MOKIBUL2026
            if (key === "MOKIBUL2026") {
                // लॉगिन एरिया छुपाना
                document.getElementById("inputArea").style.display = "none";
                document.getElementById("status-text").style.display = "none";
                
                // वेलकम मैसेज दिखाना
                document.getElementById("welcomeArea").style.display = "block";
                
                // बॉक्स का टाइटल बदलना
                document.querySelector("h1").innerText = "SYSTEM UNLOCKED";
            } else {
                alert("WRONG KEY! कोशिश करते रहो।");
                document.getElementById("keyInput").value = "";
            }
        }
    </script>

</body>
</html>
