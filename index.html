<!DOCTYPE html>
<html>
<head>
<style>
  body {
    background-color: #0d1117; /* GitHub Dark Theme */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: Arial, sans-serif;
  }

  .name-card {
    color: #58a6ff;
    font-size: 3rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 5px;
    text-shadow: 0 0 10px #58a6ff, 0 0 20px #58a6ff;
    animation: glow 2s ease-in-out infinite alternate;
  }

  @keyframes glow {
    from {
      text-shadow: 0 0 10px #58a6ff, 0 0 20px #58a6ff;
    }
    to {
      text-shadow: 0 0 20px #bc8cff, 0 0 30px #bc8cff;
      color: #bc8cff;
    }
  }
</style>
</head>
<body>

  <div class="name-card">आपका नाम यहाँ लिखें</div>

</body>
</html>
