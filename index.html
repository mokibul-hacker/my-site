<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOKIM 4K DOWNLOADER</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .box { background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 450px; margin: auto; border: 1px solid #334155; }
        h1 { color: #38bdf8; font-size: 26px; margin-bottom: 10px; }
        input { width: 90%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: none; outline: none; font-size: 16px; background: #334155; color: white; }
        .btn { background: #38bdf8; color: #0f172a; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; }
        #output { margin-top: 25px; display: none; }
        iframe { width: 100%; height: 150px; border: none; border-radius: 15px; background: white; }
    </style>
</head>
<body>

    <div class="box">
        <h1>MOKIM DOWNLOADER 📥</h1>
        <p>Instagram, YouTube, FB वीडियो डाउनलोड करें</p>
        
        <input type="text" id="userInput" placeholder="यहाँ लिंक पेस्ट करें...">
        <button class="btn" onclick="startDownload()">डाउनलोड लिंक बनाएँ</button>

        <div id="output">
            <p style="color: #fbbf24; margin-bottom: 10px;">नीचे दिए बटन पर क्लिक करके डाउनलोड करें:</p>
            <iframe id="dlEngine" src=""></iframe>
        </div>
    </div>

    <script>
        function startDownload() {
            let link = document.getElementById('userInput').value;
            let output = document.getElementById('output');
            let dlEngine = document.getElementById('dlEngine');

            if (!link) {
                alert("भाई, लिंक तो डालो!");
                return;
            }

            // लिंक से एक्स्ट्रा कचरा साफ करना
            let cleanLink = link.split('?')[0];

            output.style.display = "block";
            // Loader.to का डायरेक्ट बटन इंजन
            dlEngine.src = `https://loader.to/api/button/?url=${encodeURIComponent(cleanLink)}&f=mp4`;
        }
    </script>

</body>
</html>
