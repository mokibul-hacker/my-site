<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mokim Universal 4K Downloader</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .box { background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 450px; margin: auto; border: 1px solid #334155; }
        h1 { color: #38bdf8; font-size: 24px; }
        input { width: 90%; padding: 15px; margin: 20px 0; border-radius: 10px; border: none; outline: none; font-size: 16px; }
        .btn { background: #38bdf8; color: #0f172a; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn:hover { background: #7dd3fc; }
        #output { margin-top: 30px; display: none; background: #334155; padding: 15px; border-radius: 10px; }
        video { width: 100%; border-radius: 10px; }
        .dl-btn { display: block; background: #22c55e; color: white; text-decoration: none; padding: 12px; margin-top: 15px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h1>MOKIM DOWNLOADER 📥</h1>
        <p>YouTube, Insta या FB का लिंक यहाँ डालें</p>
        
        <input type="text" id="userInput" placeholder="यहाँ लिंक पेस्ट करें...">
        <button class="btn" onclick="processDownload()">वीडियो लोड करें</button>

        <div id="output">
            <p id="status" style="color: #fbbf24;"></p>
            <video id="videoPlayer" controls></video>
            <a id="downloadLink" href="#" class="dl-btn" download>गैलरी में सेव करें (4K/HD)</a>
        </div>
    </div>

    <script>
        function processDownload() {
            let link = document.getElementById('userInput').value;
            let output = document.getElementById('output');
            let status = document.getElementById('status');

            if (!link) {
                alert("भाई, लिंक डालना भूल गए!");
                return;
            }

            output.style.display = "block";
            status.innerText = "वीडियो ढूँढ रहा हूँ... कृपया रुकें";

            // यहाँ हम पहचान रहे हैं कि लिंक किसका है
            if (link.includes("youtube.com") || link.includes("youtu.be")) {
                status.innerText = "यूट्यूब वीडियो तैयार हो रहा है...";
            } else if (link.includes("instagram.com")) {
                status.innerText = "इंस्टाग्राम रील लोड हो रही है...";
            } else if (link.includes("facebook.com")) {
                status.innerText = "फेसबुक वीडियो लोड हो रहा है...";
            } else {
                status.innerText = "भाई, यह लिंक सही नहीं लग रहा!";
            }
        }
    </script>

</body>
</html>
