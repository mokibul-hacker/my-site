<!DOCTYPE html>
<html>
<head>
    <title>Mokibul Khan Server</title>
    <style>
        body { background-color: black; color: #39ff14; font-family: monospace; text-align: center; padding-top: 100px; }
        .box { border: 2px solid #39ff14; display: inline-block; padding: 20px; border-radius: 10px; box-shadow: 0 0 15px #39ff14; }
        input { background: transparent; border: 1px solid #39ff14; color: white; padding: 10px; margin: 10px; text-align: center; }
        button { background: #39ff14; color: black; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h1>MOKIBUL KHAN SERVER</h1>
        <p>System Locked: Enter Key</p>
        <input type="password" id="key" placeholder="Secret Key..."> <br>
        <button onclick="checkKey()">ACCESS GRANTED</button>
    </div>

    <script>
        function checkKey() {
            var pass = document.getElementById("key").value;
            // यहाँ अपनी पसंद का पासवर्ड सेट करें
            if (pass === "MOKIM_786") {
                alert("Access Granted! Welcome Boss.");
                window.location.href = "https://your-next-page.com";
            } else {
                alert("Wrong Key! System Blocked.");
            }
        }
    </script>
</body>
</html>
