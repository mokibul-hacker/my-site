<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOKIM 4K DOWNLOADER</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .box { background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 450px; margin: auto; border: 1px solid #334155; }
        h1 { color: #38bdf8; font-size: 26px; margin-bottom: 10px; }
        input { width: 90%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: none; outline: none; font-size: 16px; background: #334155; color: white; }
        .btn { background: #38bdf8; color: #0f172a; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; }
        #output { margin-top: 25px; display: none; background: #1e293b; padding: 10px; border-radius: 15px; }
        iframe { width: 100%; height: 250px; border: none; border-radius: 15px; background: white; }
    </style>
</head>
<body>

    <div class="box">
        <h1>MOKIM DOWNLOADER 📥</h1>
        <p>Instagram, YouTube, FB वीडियो यहाँ से डाउनलोड करें</p>
        
        <input type="text" id="userInput" placeholder="यहाँ वीडियो लिंक पेस्ट करें...">
        <button class="btn" onclick="startDownload()">डाउनलोड बटन बनाएँ</button>

        <div id="output">
            <p style="color: #fbbf24; margin-bottom: 10px;">नीचे बटन लोड हो रहा है, थोड़ा इंतज़ार करें...</p>
            <div id="engine-container"></div>
        </div>
    </div>

    <script>
        function startDownload() {
            let link = document.getElementById('userInput').value;
            let output = document.getElementById('output');
            let container = document.getElementById('engine-container');

            if (!link) {
                alert("भाई, लिंक तो डालो!");
                return;
            }

            output.style.display = "block";
            // यह इंजन बिना किसी चाबी के सीधा वीडियो निकालता है
            container.innerHTML = `<iframe src="https://alldownloader.pro/api/widget?url=${encodeURIComponent(link)}"></iframe>`;
        }
    </script>

</body>
</html>
