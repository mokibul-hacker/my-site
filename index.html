<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOKIBUL KHAN PRIVATE SERVER</title>
    <style>
        body { background-color: #050505; color: #00FF00; font-family: 'Courier New', Courier, monospace; text-align: center; padding-top: 50px; }
        .box { border: 2px solid #00FF00; padding: 30px; display: inline-block; border-radius: 15px; background: #111; box-shadow: 0 0 20px #00FF00; }
        input { background: #000; border: 1px solid #00FF00; color: #00FF00; padding: 12px; width: 220px; text-align: center; border-radius: 5px; margin-bottom: 10px; }
        button { background: #00FF00; color: #000; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #secret-area { display: none; margin-top: 30px; }
    </style>
</head>
<body>
    <div id="login-screen" class="box">
        <h1>MOKIBUL KHAN SERVER</h1>
        <p>System Locked: Enter Secret Key</p>
        <input type="password" id="userPass" placeholder="Secret Key...">
        <br>
        <button onclick="unlock()">ACCESS GRANTED</button>
    </div>
    <div id="secret-area">
        <h1>Welcome to the Hidden Zone</h1>
        <p>Swaagat Hai Mokibul Bhai! Sab Kuch Surakshit Hai.</p>
    </div>
    <script>
        function unlock() {
            var input = document.getElementById("userPass").value;
            // Password 'Mokim@123' hidden in Base64
            var key = "TW9raW1AMTIz"; 
            if (btoa(input) === key) {
                alert("Identity Confirmed!");
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("secret-area").style.display = "block";
            } else {
                alert("Access Denied!");
            }
        }
    </script>
</body>
</html>
