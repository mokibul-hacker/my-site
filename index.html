<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOKIM 4K DOWNLOADER</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .box { background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 450px; margin: auto; border: 1px solid #334155; }
        h1 { color: #38bdf8; font-size: 26px; margin-bottom: 10px; }
        input { width: 90%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: none; outline: none; font-size: 16px; background: #334155; color: white; }
        .btn { background: #38bdf8; color: #0f172a; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; }
        #result-box { margin-top: 25px; display: none; background: #334155; padding: 20px; border-radius: 15px; border: 1px solid #22c55e; }
        .dl-btn { display: inline-block; background: #22c55e; color: white; padding: 15px 25px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 10px; width: 85%; }
    </style>
</head>
<body>

    <div class="box">
        <h1>MOKIM DOWNLOADER 📥</h1>
        <p>लिंक पेस्ट करें और डाउनलोड सर्वर चुनें</p>
        
        <input type="text" id="vLink" placeholder="यहाँ लिंक पेस्ट करें...">
        <button class="btn" onclick="showOptions()">लिंक तैयार करें</button>

        <div id="result-box">
            <p style="color: #22c55e; font-weight: bold;">वीडियो तैयार है! ✅</p>
            <div id="options"></div>
            <p style="font-size: 12px; margin-top: 15px; color: #94a3b8;">अगर Server 1 काम न करे, तो Server 2 ट्राई करें।</p>
        </div>
    </div>

    <script>
        function showOptions() {
            let link = document.getElementById('vLink').value;
            let resultBox = document.getElementById('result-box');
            let optionsDiv = document.getElementById('options');

            if (!link) { alert("भाई, लिंक डालो!"); return; }
            resultBox.style.display = "block";
            
            // ये तीनों अलग-अलग कंपनी के सर्वर हैं, एक न एक पक्का खुलेगा
            let s1 = "https://snapinsta.app/php/download.php?url=" + encodeURIComponent(link);
            let s2 = "https://9xbuddy.xyz/process?url=" + encodeURIComponent(link);
            let s3 = "https://en.savefrom.net/1-youtube-video-downloader-385vG/?url=" + encodeURIComponent(link);
            
            optionsDiv.innerHTML = `
                <a href="${s1}" target="_blank" class="dl-btn">Server 1 (Fast)</a>
                <a href="${s2}" target="_blank" class="dl-btn" style="background:#0ea5e9;">Server 2 (Backup)</a>
                <a href="${s3}" target="_blank" class="dl-btn" style="background:#f59e0b;">Server 3 (Old School)</a>
            `;
        }
    </script>

</body>
</html>
