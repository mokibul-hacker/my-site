

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">

    <title>MOKIM 4K DOWNLOADER</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .box { background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 450px; margin: auto; border: 1px solid #334155; }
        h1 { color: #38bdf8; font-size: 26px; margin-bottom: 10px; }
        input { width: 90%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: none; outline: none; font-size: 16px; background: #334155; color: white; }
        .btn { background: #38bdf8; color: #0f172a; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; transition: 0.3s; }
        .btn:hover { background: #7dd3fc; transform: scale(1.02); }
        #output { margin-top: 30px; display: none; background: #334155; padding: 20px; border-radius: 15px; border: 1px dashed #38bdf8; }
        #status { font-weight: bold; margin-bottom: 15px; }
        .dl-link { display: inline-block; background: #22c55e; color: white; padding: 15px 25px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="box">
        <h1>MOKIM DOWNLOADER 📥</h1>
        <p>Instagram, YouTube, Facebook वीडियो यहाँ से डाउनलोड करें</p>
        
        <input type="text" id="userInput" placeholder="यहाँ वीडियो का लिंक पेस्ट करें...">
        <button class="btn" onclick="processDownload()">वीडियो लोड करें</button>

        <div id="output">
            <div id="status"></div>
        </div>
    </div>

    <script>
        async function processDownload() {
            let link = document.getElementById('userInput').value;
            let output = document.getElementById('output');
            let status = document.getElementById('status');

            if (!link) {
                alert("भाई, पहले लिंक तो डालो!");
                return;
            }

            output.style.display = "block";
            status.innerHTML = "<span style='color: #fbbf24;'>वीडियो ढूँढ रहा हूँ... थोड़ा इंतज़ार करें भाई।</span>";

            const options = {
                method: 'POST',
                headers: {
                    'x-rapidapi-key': '3b5b44ae90msh2386e165973a560j1481eajsn377312384f7b',
                    'x-rapidapi-host': 'auto-download-all-in-one.p.rapidapi.com',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ url: link })
            };

            try {
                const response = await fetch('https://auto-download-all-in-one.p.rapidapi.com/v1/social/autolink', options);
                const result = await response.json();
                
                if (result && result.video) {
                    status.innerHTML = `
                        <p style="color: #22c55e; font-size: 18px;">वीडियो मिल गया! ✅</p>
                        <a href="${result.video}" target="_blank" class="dl-link">गैलरी में सेव करें</a>
                    `;
                } else {
                    status.innerHTML = "<span style='color: #ef4444;'>माफी भाई, इस लिंक से वीडियो नहीं मिला।</span>";
                }
            } catch (error) {
                status.innerHTML = "<span style='color: #ef4444;'>सर्वर में दिक्कत है, दोबारा ट्राई करें।</span>";
            }
        }
    </script>

</body>
</html>
