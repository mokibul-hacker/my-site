<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOKIBUL KHAN SERVER</title>
    <style>
        body { background-color: black; color: #0f0; font-family: monospace; text-align: center; margin: 0; padding: 20px; }
        .box { border: 2px solid #0f0; padding: 20px; border-radius: 15px; box-shadow: 0 0 15px #0f0; background: rgba(0, 20, 0, 0.9); margin-top: 50px; }
        input { background: black; border: 1px solid #0f0; color: #0f0; padding: 12px; width: 80%; margin: 15px 0; text-align: center; }
        button { background: #0f0; color: black; border: none; padding: 10px 25px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #gallery { display: none; }
        .my-photo { width: 100%; max-width: 350px; border: 2px solid #0f0; border-radius: 10px; margin-top: 20px; box-shadow: 0 0 20px #0f0; }
        h1 { text-shadow: 0 0 10px #0f0; font-size: 20px; }
    </style>
</head>
<body>

    <div id="login-box" class="box">
        <h1>MOKIBUL KHAN SERVER</h1>
        <p>System Locked: Enter Key</p>
        <input type="password" id="pass" placeholder="Secret Key...">
        <br>
        <button onclick="check()">ACCESS GRANTED</button>
    </div>

    <div id="gallery" class="box">
        <h1>HIDDEN GALLERY</h1>
        <p>Swaagat Hai Mokibul Bhai!</p>
        <img src="photo.jpg" class="my-photo">
        <br><br>
        <button onclick="location.reload()">LOGOUT</button>
    </div>

    <script>
        function check() {
            var p = document.getElementById("pass").value;
            if(btoa(p) === "TW9raW1AMTIz") {
                document.getElementById("login-box").style.display = "none";
                document.getElementById("gallery").style.display = "block";
            } else {
                alert("Wrong Key! Access Denied.");
            }
        }
    </script>
